<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/5ca0f43a2b.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <title>Morden Login Page</title>
</head>
<body>
    <div id="container" class="container">
        <div class="form-container sign-up">
            <form>
                <h1>Create Account</h1>
                <div class="social-icons">
                    <a hreft="#" class="icon"><i class="fa-brands fa-google"></i></a>
                    <a hreft="#" class="icon"><i class="fa-brands fa-facebook"></i></a>
                    <a hreft="#" class="icon"><i class="fa-brands fa-github"></i></a>
                    <a hreft="#" class="icon"><i class="fa-brands fa-linkedin"></i></a>

                </div>
                <span>or use your email for registeration</span>
                <input type="text" placeholder="Name">
                <input type="email" placeholder="Email">
                <input type="password" placeholder="Password">
                <button Sign up</button>

            </form>
        </div>

                <div class="form-container sign-in">
            <form>
                <h1> Sign in</h1>
                <div class="social-icons">
                    <a href="#" class="icon"><i class="fa-brands fa-google"></i></a>
                    <a href="#" class="icon"><i class="fa-brands fa-facebook"></i></a>
                    <a href="#" class="icon"><i class="fa-brands fa-github"></i></a>
                    <a href="#" class="icon"><i class="fa-brands fa-linkedin"></i></a>

                </div>
                <span>or use your email for registeration</span>
                <input type="email" placeholder="Email">
                <input type="password" placeholder="Password">
                <a href="#">Forgot your password?</a>
                <button>Sign in</button>
            </form>
        </div>

        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                    <h1>Welcome back</h1>
                    <p>Enter your personal details to use all of site features</p>
                    <button class="hidden" id="login">Sign in</button>
                </div>

                <div class="toggle-panel toggle-right">
                    <h1>Hello Friend</h1>
                    <p>Register your personal details to use all of site features</p>
                    <button class="hidden" id="register">Sign up</button>
                </div>
            </div>
        </div>
    </div>
    

    <script src="script.js"></script>
</body>
</html>
