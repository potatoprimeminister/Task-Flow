<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/5ca0f43a2b.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">    <!--change the title later-->
    <title>TaskFlow</title>
</head>
<body>
    <div class="board">
        <button class="addList" id="showAddListBtn">
                    <i class="fa-solid fa-plus"></i>
                    Add a list
        </button>
        <div class="listInput hidden" id="listInputSection">
            <input type="text" id="listInputBox" placeholder="Enter a title for this list" class="inputBox">
                <div class="listButtons">
                    <button class="addListBtn" id="listHiddenBtn">
                        Add list
                    </button>
                    <button class="addListBtn">
                        <i class="fa-solid fa-x"></i>
                    </button>
                </div>
        </div>
    </div>

    <script src="scripts.js" defer></script>
</body>
</html>
